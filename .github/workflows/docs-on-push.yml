name: Generate Docs on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Anodyse
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
      
      - name: Generate docs from samples
        run: |
          echo "Generating documentation from samples..."
          mkdir -p docs/samples
          
          # Skip these directories:
          # - SAMPLE-OUTPUT: output examples, not playbooks
          # - anodyse-template-overrides: custom templates, not playbooks  
          # - missing-comments: intentionally missing annotations (generates exit code 2)
          skip_dirs=("SAMPLE-OUTPUT" "anodyse-template-overrides" "missing-comments")
          
          # Generate docs for each sample directory
          for sample in samples/*/; do
            # Skip if not a directory
            if [[ ! -d "$sample" ]]; then
              continue
            fi
            
            sample_name=$(basename "$sample")
            
            # Check if this directory should be skipped
            should_skip=false
            for skip in "${skip_dirs[@]}"; do
              if [[ "$sample_name" == "$skip" ]]; then
                should_skip=true
                break
              fi
            done
            
            if [[ "$should_skip" == "true" ]]; then
              echo "Skipping: $sample_name (special directory)"
              continue
            fi
            
            echo "Processing: $sample_name"
            anodyse "$sample" --output "docs/samples" 2>/dev/null || \
              echo "  ⚠ Warning: Could not process $sample_name"
          done
          
          echo "✓ Documentation generated"
      
      - name: Generate index of all samples
        if: success()
        run: |
          echo "# Generated Sample Documentation" > docs/samples/index.md
          echo "" >> docs/samples/index.md
          echo "Auto-generated from sample playbooks every commit." >> docs/samples/index.md
          echo "" >> docs/samples/index.md
          echo "## Sample Documentation" >> docs/samples/index.md
          echo "" >> docs/samples/index.md
          
          # Find all generated .md files (except index.md itself)
          for doc in docs/samples/*.md; do
            filename=$(basename "$doc")
            if [[ "$filename" != "index.md" ]]; then
              # Convert filename to title (remove .md, replace hyphens with spaces)
              title="${filename%.md}"
              title="${title//-/ }"
              echo "- [$title]($filename)" >> docs/samples/index.md
            fi
          done
      
      - name: Verify generated docs
        run: |
          echo "Verifying generated documentation..."
          if [[ ! -d "docs/samples" ]] || [[ -z "$(ls -A docs/samples)" ]]; then
            echo "✗ No documentation generated"
            exit 1
          fi
          
          file_count=$(find docs/samples -type f | wc -l)
          echo "✓ Generated $file_count documentation files"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: generated-docs
          path: docs/samples/
          retention-days: 30
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/samples
          destination_dir: samples
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
      
      - name: Comment on commit
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = context.job.status === 'success' ? '✅ Success' : '❌ Failed';
            const message = `${status}: Documentation generated from samples`;
            console.log(message);

  # Optional: Run basic validation
  validate:
    name: Validate Anodyse Install
    runs-on: ubuntu-latest
    needs: generate
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Verify Anodyse works
        run: |
          pip install -e .
          anodyse --version || true
          anodyse --help > /dev/null 2>&1
          echo "✓ Anodyse CLI verified"
