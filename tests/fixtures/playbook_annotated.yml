# @title Deploy Application
# @description Deploys the application to target hosts with pre-flight checks
# @param environment: Target deployment environment (prod, staging, dev)
# @param version: Application version to deploy (semver format)
# @warning In production, prerequire approval before execution
# @example anodyse -t prod -v 1.2.3
# @example anodyse -t staging -v 1.2.3-beta
# @tag deployment
# @tag production

---
- hosts: webservers
  vars:
    app_name: myapp
    app_user: appuser
    app_port: 8080
  
  pre_tasks:
    - name: Check system requirements
      debug:
        msg: "Checking system prerequisites"
  
  tasks:
    - name: Install application dependencies
      package:
        name: "{{ item }}"
        state: present
      loop:
        - python3
        - python3-pip
        - git
      tags:
        - install
        - dependencies

    - name: Clone application repository
      git:
        repo: "https://github.com/example/myapp.git"
        dest: "/opt/{{ app_name }}"
        version: "{{ version | default('main') }}"
      tags:
        - deploy
        - git

    - name: Start application service
      systemd:
        name: "{{ app_name }}"
        state: started
        enabled: yes
        daemon_reload: yes
      tags:
        - deploy
        - systemd

  post_tasks:
    - name: Verify deployment
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 3
      delay: 5

  handlers:
    - name: Restart application
      systemd:
        name: "{{ app_name }}"
        state: restarted
