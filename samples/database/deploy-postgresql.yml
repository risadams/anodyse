# @title PostgreSQL Database Server Deployment
# @description Install and configure PostgreSQL database server with security hardening
# @param postgres_version PostgreSQL version to install (default: 14)
# @param postgres_port Database server port (default: 5432)
# @param db_name Name of the database to create
# @param db_user Database user to create
# @param db_password Password for the database user
# @param allow_remote Enable remote connections (default: false)
# @warning Remote access is disabled by default for security
# @warning Ensure strong passwords are used in production
# @example ansible-playbook deploy-postgresql.yml -e "db_name=myapp db_user=appuser db_password=securepass123"
# @tag database
# @tag postgresql
# @tag security
# TODO: Add automated backup configuration
# TODO(dba): Implement connection pooling with PgBouncer
# FIXME: Need to add SSL/TLS configuration for encrypted connections

---
- name: Deploy PostgreSQL Database Server
  hosts: dbservers
  become: true
  
  vars:
    postgres_version: "14"
    postgres_port: 5432
    allow_remote: false
    max_connections: 100
    shared_buffers: "256MB"
    
  tasks:
    # @task.description: Add official PostgreSQL repository for latest packages
    # @task.note: Official repo provides more recent versions than distro defaults
    # @task.tag: setup
    - name: Add PostgreSQL APT repository
      apt_repository:
        repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        state: present
      when: ansible_os_family == "Debian"
      
    # @task.description: Import GPG key for package verification
    # @task.warning: Key verification ensures package authenticity
    # @task.tag: setup
    # @task.tag: security
    - name: Add PostgreSQL GPG key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present
      when: ansible_os_family == "Debian"
      
    # Installs the specified version of PostgreSQL along with
    # contributed modules and Python bindings for Ansible automation.
    # @task.description: Install PostgreSQL server and client tools
    # @task.note: Python bindings required for Ansible database modules
    # @task.tag: install
    # TODO: Add PostgreSQL development packages for extension building
    - name: Install PostgreSQL
      apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - "postgresql-contrib-{{ postgres_version }}"
          - python3-psycopg2
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      
    # @task.description: Update PostgreSQL configuration with custom settings
    # @task.warning: Changes require service restart to take effect
    # @task.note: Tune shared_buffers based on available system memory
    # @task.tag: configuration
    # @task.tag: performance
    - name: Configure PostgreSQL  # performance tuning for production workloads
      lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?port\s*=', line: "port = {{ postgres_port }}" }
        - { regexp: '^#?max_connections\s*=', line: "max_connections = {{ max_connections }}" }
        - { regexp: '^#?shared_buffers\s*=', line: "shared_buffers = {{ shared_buffers }}" }
      notify: Restart postgresql
      
    # @task.description: Update pg_hba.conf for client access control
    # @task.warning: Restricts connections to local Unix socket by default
    # @task.warning: Review security implications before allowing remote access
    # @task.note: Template should implement principle of least privilege
    # @task.tag: configuration
    # @task.tag: security
    # FIXME(security): Add support for certificate-based authentication
    - name: Configure pg_hba
      template:
        src: pg_hba.conf.j2
        dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: '0640'
      notify: Restart postgresql
      
    # @task.description: Ensure PostgreSQL service is running and enabled at boot
    # @task.tag: service
    - name: Start PostgreSQL service
      service:
        name: postgresql
        state: started
        enabled: yes
        
    # @task.description: Create a new database for the application
    # @task.note: Database created with default encoding and locale
    # @task.tag: database
    # TODO: Add support for custom database encoding and collation
    - name: Create database
      postgresql_db:
        name: "{{ db_name }}"
        state: present
      become_user: postgres
      when: db_name is defined
      
    # @task.description: Create a new database user with authentication
    # @task.warning: Ensure db_password is stored securely (use Ansible Vault)
    # @task.warning: Password will be visible in logs if not properly protected
    # @task.note: User granted ALL privileges on specified database
    # @task.tag: database
    # @task.tag: security
    - name: Create database user
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        db: "{{ db_name }}"
        priv: ALL
        state: present
      become_user: postgres
      when: 
        - db_user is defined
        - db_password is defined
        - db_name is defined
      
    # @task.description: Open PostgreSQL port in firewall if remote access enabled
    # @task.warning: Only opens port when allow_remote is true
    # @task.warning: Ensure VPN or IP whitelisting is used for production
    # @task.tag: firewall
    # @task.tag: security
    - name: Configure firewall for PostgreSQL
      ufw:
        rule: allow
        port: "{{ postgres_port }}"
        proto: tcp
      when: 
        - ansible_os_family == "Debian"
        - allow_remote | bool
        
  handlers:
    # @task.description: Restart PostgreSQL to apply configuration changes
    # @task.warning: Restart will temporarily interrupt database connections
    # @task.note: Consider using reload for non-critical config changes
    # @task.tag: service
    - name: Restart postgresql
      service:
        name: postgresql
        state: restarted
