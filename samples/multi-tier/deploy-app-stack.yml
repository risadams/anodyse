# @title Multi-Tier Application Stack Deployment
# @description Deploy a complete 3-tier application stack with load balancer, app servers, and database
# @param app_version Application version to deploy
# @param environment Deployment environment (dev/staging/prod)
# @param lb_algorithm Load balancer algorithm (roundrobin/leastconn)
# @param app_replicas Number of application server instances
# @param db_backup_enabled Enable automated database backups
# @warning This is a complex multi-host deployment
# @warning Ensure all host groups are defined in inventory
# @example ansible-playbook deploy-app-stack.yml -e "environment=prod app_version=1.2.3"
# @tag multi-tier
# @tag loadbalancer
# @tag high-availability
# TODO: Add health check monitoring and alerting
# TODO(ops): Implement blue-green deployment capability
# FIXME: Session persistence configuration needs testing

---
- name: Deploy Load Balancer
  hosts: loadbalancers
  become: true
  
  vars:
    lb_algorithm: roundrobin
    health_check_interval: 5
    
  tasks:
    # @task.description: Install HAProxy load balancer
    # @task.note: HAProxy provides high-performance load balancing
    # @task.tag: install
    # @task.tag: loadbalancer
    - name: Install HAProxy
      apt:
        name: haproxy
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      
    # @task.description: Deploy HAProxy configuration with backend servers
    # @task.warning: Configuration changes require HAProxy restart or reload
    # @task.note: Template dynamically generates backend server list from inventory
    # @task.tag: configuration
    # @task.tag: loadbalancer
    # TODO(devops): Add SSL termination configuration
    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: '0644'
      notify: Restart haproxy
      
    # @task.description: Start and enable HAProxy
    # @task.tag: service
    # @task.tag: loadbalancer
    - name: Start HAProxy
      service:
        name: haproxy
        state: started
        enabled: yes
        
    # @task.description: Open HTTP and HTTPS ports
    # @task.warning: Ensure these ports align with your security policy
    # @task.tag: firewall
    # @task.tag: security
    - name: Allow HTTP/HTTPS traffic  # external traffic ingress point
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - 80
        - 443

- name: Deploy Application Servers
  hosts: appservers
  become: true
  
  vars:
    app_version: latest
    app_name: myapp
    app_port: 8080
    app_user: appuser
    environment: production
    node_env: production
    
  tasks:
    # @task.description: Create dedicated system user for running the application
    # @task.note: System user with no shell for security
    # @task.warning: Ensure home directory has appropriate permissions
    # @task.tag: setup
    # @task.tag: security
    - name: Create application user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/false
        home: "/opt/{{ app_name }}"
        create_home: yes
        
    # Installs the Node.js runtime and package manager.
    # Git is required for application deployment from repository.
    # @task.description: Install Node.js and required system packages
    # @task.note: Uses distribution's Node.js version for compatibility
    # @task.tag: install
    # TODO: Consider using NodeSource repository for latest LTS version
    - name: Install Node.js
      apt:
        name:
          - nodejs
          - npm
          - git
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      
    # @task.description: Clone or update application repository
    # @task.warning: Force flag will discard local changes
    # @task.note: Runs as application user for proper file ownership
    # @task.tag: deployment
    # TODO(dev): Add rollback capability for failed deployments
    - name: Deploy application
      git:
        repo: "https://github.com/example/{{ app_name }}.git"
        dest: "/opt/{{ app_name }}/app"
        version: "{{ app_version }}"
        force: yes
      become_user: "{{ app_user }}"
      notify: Restart application
      
    # @task.description: Run npm install for Node.js dependencies
    # @task.note: Production flag skips devDependencies for smaller footprint
    # @task.warning: Can take significant time on first deployment
    # @task.tag: deployment
    - name: Install npm dependencies
      npm:
        path: "/opt/{{ app_name }}/app"
        state: present
        production: yes
      become_user: "{{ app_user }}"
      
    # @task.description: Deploy environment-specific configuration
    # @task.warning: File contains sensitive data - strict permissions required
    # @task.note: Use Ansible Vault for sensitive configuration values
    # @task.tag: configuration
    # @task.tag: security
    # FIXME(security): Implement secret rotation mechanism
    - name: Deploy environment configuration
      template:
        src: app-config.env.j2
        dest: "/opt/{{ app_name }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
      notify: Restart application
      
    # @task.description: Configure systemd unit for application management
    # @task.note: Systemd provides automatic restart and logging
    # @task.tag: service
    - name: Create systemd service
      template:
        src: app.service.j2
        dest: "/etc/systemd/system/{{ app_name }}.service"
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd
      
    # @task.description: Ensure application is running and enabled at boot
    # @task.tag: service
    - name: Start application
      service:
        name: "{{ app_name }}"
        state: started
        enabled: yes
        
    # @task.description: Open application port for load balancer
    # @task.warning: Port restricted to load balancer IP only
    # @task.note: Implements defense-in-depth by limiting source IPs
    # @task.tag: firewall
    # @task.tag: security
    - name: Allow application port
      ufw:
        rule: allow
        port: "{{ app_port }}"
        proto: tcp
        from_ip: "{{ groups['loadbalancers'] | first }}"

- name: Configure Database Server
  hosts: dbservers
  become: true
  
  vars:
    db_name: appdb
    db_user: appuser
    db_backup_enabled: true
    backup_retention_days: 7
    
  tasks:
    # @task.description: Install PostgreSQL database server
    # @task.note: PostgreSQL chosen for ACID compliance and reliability
    # @task.tag: install
    # @task.tag: database
    # TODO: Add replication configuration for high availability
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      
    # @title Create application database
    # @description Create database for the application
    # @param db_name Name of the database
    - name: Create database
      postgresql_db:
        name: "{{ db_name }}"
        encoding: UTF-8
        state: present
      become_user: postgres
      
    # @title Create database user
    # @description Create database user with appropriate privileges
    # @param db_user Database username
    # @warning Password should be provided via vault
    - name: Create database user
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        db: "{{ db_name }}"
        priv: ALL
        state: present
      become_user: postgres
      
    # @title Configure database backups
    # @description Set up automated daily database backups
    # @param db_backup_enabled Whether to enable backups
    # @param backup_retention_days Number of days to retain backups
    - name: Configure backup cron job
      cron:
        name: "Database backup"
        minute: "0"
        hour: "2"
        job: "pg_dump {{ db_name }} | gzip > /var/backups/{{ db_name }}-$(date +\\%Y\\%m\\%d).sql.gz"
        user: postgres
      when: db_backup_enabled | bool
      
    # @title Clean old backups
    # @description Remove backups older than retention period
    - name: Configure backup cleanup
      cron:
        name: "Cleanup old backups"
        minute: "30"
        hour: "2"
        job: "find /var/backups -name '{{ db_name }}-*.sql.gz' -mtime +{{ backup_retention_days }} -delete"
        user: postgres
      when: db_backup_enabled | bool
      
    # @title Start PostgreSQL service
    # @description Ensure database service is running
    - name: Start PostgreSQL
      service:
        name: postgresql
        state: started
        enabled: yes

  handlers:
    - name: Restart haproxy
      service:
        name: haproxy
        state: restarted
        
    - name: Restart application
      service:
        name: "{{ app_name }}"
        state: restarted
        
    - name: Reload systemd
      systemd:
        daemon_reload: yes
