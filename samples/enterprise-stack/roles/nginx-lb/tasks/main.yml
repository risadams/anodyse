# @title NGINX Load Balancer Configuration
# @description Deploy and configure NGINX as a reverse proxy load balancer with SSL termination
# @param lb_algorithm Load balancing algorithm (round_robin, least_conn, ip_hash)
# @param backend_servers List of backend application servers
# @warning SSL certificates must be deployed before running this role
# @tag loadbalancer
# @tag nginx
# @tag ssl

---
# @title Install NGINX
# @description Install NGINX web server package
- name: Install nginx
  package:
    name: nginx
    state: present
  tags: install

# @title Remove default NGINX configuration
# @description Clean up default site configuration
- name: Remove default nginx config
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/conf.d/default.conf
  notify: Reload nginx

# @title Deploy upstream configuration
# @description Configure backend application server pool
# @param backend_servers Array of backend server addresses
- name: Deploy upstream configuration
  template:
    src: upstream.conf.j2
    dest: /etc/nginx/conf.d/upstream.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

# @title Deploy load balancer configuration
# @description Configure NGINX virtual host with proxy settings and SSL
- name: Deploy nginx load balancer config
  template:
    src: loadbalancer.conf.j2
    dest: /etc/nginx/conf.d/loadbalancer.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

# @title Configure SSL/TLS settings
# @description Deploy SSL configuration with modern cipher suites
# @param ssl_protocols Allowed SSL/TLS protocol versions
- name: Deploy SSL configuration
  template:
    src: ssl.conf.j2
    dest: /etc/nginx/conf.d/ssl.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

# @title Configure health check endpoint
# @description Set up dedicated health check endpoint for load balancer monitoring
- name: Deploy health check endpoint
  template:
    src: health.conf.j2
    dest: /etc/nginx/conf.d/health.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

# @title Optimize NGINX performance
# @description Apply performance tuning to nginx.conf
- name: Configure nginx performance settings
  lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: "{{ item.insertafter | default(omit) }}"
  loop:
    - regexp: '^\s*worker_processes'
      line: '    worker_processes auto;'
    - regexp: '^\s*worker_connections'
      line: '        worker_connections 4096;'
      insertafter: 'events {'
    - regexp: '^\s*keepalive_timeout'
      line: '    keepalive_timeout 65;'
  notify: Reload nginx

# @title Create log directories
# @description Ensure log directories exist with proper permissions
- name: Create nginx log directories
  file:
    path: "{{ item }}"
    state: directory
    owner: nginx
    group: nginx
    mode: '0755'
  loop:
    - /var/log/nginx/access
    - /var/log/nginx/error

# @title Configure access logs
# @description Set up structured JSON logging for better log analysis
- name: Deploy custom log format
  blockinfile:
    path: /etc/nginx/nginx.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - LOG FORMAT"
    insertafter: 'http {'
    block: |2
          log_format json_combined escape=json
          '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status": "$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
          '}';
  notify: Reload nginx

# @title Enable and start NGINX
# @description Ensure NGINX service is running and enabled at boot
- name: Enable nginx service
  systemd:
    name: nginx
    state: started
    enabled: yes

# @title Configure firewall rules
# @description Open ports for HTTP and HTTPS traffic
- name: Open firewall ports
  firewalld:
    port: "{{ item }}"
    permanent: yes
    immediate: yes
    state: enabled
  loop:
    - 80/tcp
    - 443/tcp
  when: ansible_os_family == "RedHat"
