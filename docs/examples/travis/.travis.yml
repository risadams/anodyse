# ============================================================
# TRAVIS CI STATUS & FUTURE
# ============================================================
#
# Current Status (as of 2026):
# - Legacy platform, transitioning to sustainable model
# - Free public repository support
# - Building migration path for PRs
# - Largely replaced by GitHub Actions for GitHub projects
#
# Recommendation:
# - For GitHub projects: Use GitHub Actions instead
# - For legacy projects: Travis CI still works
# - For new projects: Choose GitHub Actions or GitLab CI
#
# Why consider Travis CI:
# - Mature and stable platform
# - Good multi-language support
# - Simple .travis.yml syntax
# - Excellent documentation
# - Good for open-source projects
#
# Why avoid for new projects:
# - Declining development activity
# - GitHub Actions now native to GitHub
# - GitLab CI better for GitLab projects
# - Woodpecker/CircleCI better alternatives
#
# ============================================================
# PRICING
# ============================================================
#
# Travis CI Free Tier:
# - Unlimited builds (subject to fair use)
# - Public repositories only
# - Concurrent builds: 1 (free tier)
# - Build logs: Kept for 1 month
#
# Estimate for Anodyse:
# - Small playbook (~20 files): 2-3 minutes
# - Medium playbook (~100 files): 5-10 minutes
# - Large playbook (~500+ files): 15-20 minutes
#
# ============================================================
