# Travis CI Configuration: Anodyse Documentation Generation
#
# Travis CI is a legacy but still functioning CI platform
# Transitioning to "sustainable open source" model
# Best for small projects and public repositories
#
# File location: .travis.yml in repository root
#

# ============================================================
# Language and environment
# ============================================================

language: python

# Python versions to test against
python:
  - "3.9"
  - "3.11"

# ============================================================
# Environment variables
# ============================================================

env:
  global:
    - ANODYSE_INPUT_DIR=./playbooks
    - ANODYSE_OUTPUT_DIR=./docs/generated
    - ANODYSE_TEMPLATE_DIR=./templates

# ============================================================
# Installation
# ============================================================

install:
  - echo "Installing Anodyse..."
  - pip install --upgrade pip setuptools wheel
  - pip install anodyse
  - python -m anodyse --version

# ============================================================
# Script (tests / build)
# ============================================================

script:
  # Verify input directory exists
  - |
    if [ ! -d "$ANODYSE_INPUT_DIR" ]; then
      echo "ERROR: Input directory not found: $ANODYSE_INPUT_DIR"
      exit 1
    fi
  
  # Create output directory
  - mkdir -p $ANODYSE_OUTPUT_DIR
  
  # Generate documentation
  - |
    python -m anodyse \
      --input-path $ANODYSE_INPUT_DIR \
      --output-path $ANODYSE_OUTPUT_DIR
  
  # Verify output
  - |
    if [ ! -f "$ANODYSE_OUTPUT_DIR/index.md" ]; then
      echo "ERROR: index.md not generated"
      exit 1
    fi
  
  # Display generated files
  - ls -lah $ANODYSE_OUTPUT_DIR/
  - find $ANODYSE_OUTPUT_DIR -name "*.md" | wc -l

# ============================================================
# Branching and deployment
# ============================================================

branches:
  only:
    - main
    - develop
    - /^release\/.*$/

# ============================================================
# Deployment (optional)
# ============================================================

# Deploy to GitHub Pages
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN
  local_dir: $ANODYSE_OUTPUT_DIR
  target_branch: gh-pages
  on:
    branch: main
    python: "3.11"  # Only deploy once for latest Python version

# ============================================================
# Notifications
# ============================================================

notifications:
  email:
    on_success: change
    on_failure: always

# ============================================================
# Build cache
# ============================================================

cache: pip

