# ============================================================
# DIFFERENCES FROM OTHER CI SYSTEMS
# ============================================================
#
# CircleCI (vs GitHub Actions):
# - version: 2.1 instead of YAML keys
# - Docker images specified per job
# - Workflows define pipeline structure
# - Built-in artifact storage
# - Great UI for debugging
#
# CircleCI (vs GitLab CI/CD):
# - Similar concepts (jobs, containers, artifacts)
# - CircleCI UI-first vs. GitLab config-first
# - CircleCI better for open-source (free credits)
# - GitLab better for self-hosted
# - CircleCI has larger free tier
