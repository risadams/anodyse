version: 2.1

# ============================================================
# Jobs
# ============================================================

jobs:
  generate_docs:
    docker:
      - image: python:3.11-slim
    
    environment:
      ANODYSE_INPUT_DIR: ./playbooks
      ANODYSE_OUTPUT_DIR: ./docs/generated
      ANODYSE_TEMPLATE_DIR: ./templates
    
    steps:
      # ======================================================
      # Step 1: Checkout code
      # ======================================================
      - checkout
      
      # ======================================================
      # Step 2: Setup and verification
      # ======================================================
      - run:
          name: Setup and Verification
          command: |
            echo "=========================================="
            echo "Anodyse Documentation Generation"
            echo "=========================================="
            echo ""
            echo "GitHash:    $CIRCLE_SHA1"
            echo "Branch:     $CIRCLE_BRANCH"
            echo "Tag:        $CIRCLE_TAG"
            python --version
            pip --version
      
      # ======================================================
      # Step 3: Prepare environment
      # ======================================================
      - run:
          name: Verify Input Directory
          command: |
            if [ ! -d "$ANODYSE_INPUT_DIR" ]; then
              echo "ERROR: Input directory not found: $ANODYSE_INPUT_DIR"
              exit 1
            fi
            
            echo "Input directory: $ANODYSE_INPUT_DIR"
            echo "YAML files found:"
            find $ANODYSE_INPUT_DIR -name "*.yml" -o -name "*.yaml" | head -10
      
      # ======================================================
      # Step 4: Install Anodyse
      # ======================================================
      - run:
          name: Install Anodyse
          command: |
            pip install --upgrade pip setuptools wheel
            pip install anodyse
            echo "Anodyse installed:"
            python -m anodyse --version
      
      # ======================================================
      # Step 5: Generate documentation
      # ======================================================
      - run:
          name: Generate Documentation
          command: |
            echo "Generating documentation..."
            mkdir -p $ANODYSE_OUTPUT_DIR
            
            python -m anodyse \
              --input-path $ANODYSE_INPUT_DIR \
              --output-path $ANODYSE_OUTPUT_DIR
            
            echo ""
            echo "Generated documentation:"
            ls -lah $ANODYSE_OUTPUT_DIR/
            
            echo ""
            echo "Total files:"
            find $ANODYSE_OUTPUT_DIR -name "*.md" | wc -l
      
      # ======================================================
      # Step 6: Verify output
      # ======================================================
      - run:
          name: Verify Output
          command: |
            if [ ! -f "$ANODYSE_OUTPUT_DIR/index.md" ]; then
              echo "ERROR: index.md not generated"
              exit 1
            fi
            
            echo "✓ Documentation validation passed"
            echo "  - index.md found"
            echo "  - Ready for publishing"
      
      # ======================================================
      # Step 7: Store artifacts
      # ======================================================
      - store_artifacts:
          path: docs/generated
          destination: docs-artifacts

# ============================================================
# Workflows
# ============================================================

workflows:
  docs_generation:
    jobs:
      # Run on all branches and tags
      - generate_docs:
          filters:
            branches:
              only: /.*/  # Run on all branches
            tags:
              only: /.*/  # Run on all tags
  
  # Scheduled workflow (daily at 2 AM UTC)
  scheduled_docs:
    triggers:
      - schedule:
          cron: "0 2 * * *"  # Daily 2 AM
          filters:
            branches:
              only: main
    jobs:
      - generate_docs

