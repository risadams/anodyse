# GitLab CI/CD Pipeline: Basic Anodyse Integration
# Copy this file to .gitlab-ci.yml and customize paths

stages:
  - generate

variables:
  ANODYSE_INPUT_DIR: ./playbooks
  ANODYSE_OUTPUT_DIR: ./docs

generate_docs:
  stage: generate
  
  # Docker image with Python 3.11
  image: python:3.11-slim
  
  # Pipeline execution steps
  script:
    # Install Anodyse tool
    - pip install --upgrade pip
    - pip install anodyse
    
    # Generate documentation
    - python -m anodyse \
        --input-path $ANODYSE_INPUT_DIR \
        --output-path $ANODYSE_OUTPUT_DIR
  
  # Preserve generated documentation as artifacts
  artifacts:
    paths:
      - $ANODYSE_OUTPUT_DIR/
    expire_in: 30 days
  
  # When to run this pipeline
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'      # Main branch
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'  # Merge requests
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"' # Scheduled runs
      when: always
  
  # Job timeout (default is 1 hour)
  timeout: 10 minutes

