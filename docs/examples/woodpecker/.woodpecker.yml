#
# ============================================================
# DIFFERENCES FROM OTHER CI SYSTEMS
# ============================================================
#
# Woodpecker (vs GitHub Actions):
# - Uses docker: prefix for Docker images instead of uses: actions/
# - Steps instead of jobs (sequential by default)
# - No native matrix, but can define multiple steps
# - Simpler configuration, fewer features
# - Perfect for self-hosted or simpler workflows
#
# Woodpecker (vs GitLab CI/CD):
# - Similar to GitLab's structure (steps/stages)
# - Steps are sequential in a single stage
# - Easier to read and write than complex yaml
# - Less powerful than GitLab's rules system
# - Open-source and community-driven
#
# ============================================================
# INSTALLATION & SETUP
# ============================================================
#
# For Woodpecker Cloud:
# 1. Go to https://cloud.woodpecker.io
# 2. Sign in with GitHub/GitLab
# 3. Enable repositories
# 4. Add .woodpecker.yml
# 5. Push and watch it run
#
# For Self-Hosted Woodpecker:
# 1. Install Woodpecker server and agent
#    https://woodpecker-ci.org/docs/intro
# 2. Configure OAuth with GitHub/GitLab
# 3. Enable repositories in UI
# 4. Add .woodpecker.yml to repository
# 5. Push to trigger pipeline
#
# ============================================================
