# Woodpecker CI Pipeline: Anodyse Documentation Generation
#
# Woodpecker is a forked continuation of Drone CI with community support
# Use this for self-hosted or cloud Woodpecker instances
#
# File location: .woodpecker.yml in repository root
#

kind: pipeline
type: docker
name: anodyse-docs

# ============================================================
# Trigger conditions
# ============================================================

trigger:
  # Trigger on push to any branch
  event:
    - push
    - pull_request
  # Optional: limit to specific branch
  # branch:
  #   - main
  #   - develop

# ============================================================
# Environment variables
# ============================================================

variables:
  ANODYSE_INPUT_DIR: ./playbooks
  ANODYSE_OUTPUT_DIR: ./docs/generated
  ANODYSE_TEMPLATE_DIR: ./templates

# ============================================================
# Workspace
# ============================================================

workspace:
  base: /workspace

# ============================================================
# Pipeline stages
# ============================================================

steps:
  # ======================================================
  # Step 1: Setup and verification
  # ======================================================
  
  - name: setup
    image: python:3.11-slim
    commands:
      - echo "=========================================="
      - echo "Anodyse Documentation Generation"
      - echo "=========================================="
      - echo ""
      - echo "Trigger:     $CI_BUILD_EVENT"
      - echo "Branch:      $CI_COMMIT_BRANCH"
      - echo "Commit:      $CI_COMMIT_SHA"
      - echo "Workspace:   ${CI_WORKSPACE}"
      - echo ""
      - python --version
      - pip --version

  # ======================================================
  # Step 2: Verify input directory
  # ======================================================
  
  - name: verify-input
    image: python:3.11-slim
    commands:
      - |
        if [ ! -d "$ANODYSE_INPUT_DIR" ]; then
          echo "ERROR: Input directory not found: $ANODYSE_INPUT_DIR"
          exit 1
        fi
      - echo "Input directory: $ANODYSE_INPUT_DIR"
      - echo "YAML files found:"
      - find $ANODYSE_INPUT_DIR -name "*.yml" -o -name "*.yaml" | head -10

  # ======================================================
  # Step 3: Install Anodyse
  # ======================================================
  
  - name: install
    image: python:3.11-slim
    commands:
      - echo "Installing Anodyse..."
      - pip install --upgrade pip setuptools wheel
      - pip install anodyse
      - echo "Anodyse installed:"
      - python -m anodyse --version

  # ======================================================
  # Step 4: Generate documentation
  # ======================================================
  
  - name: generate
    image: python:3.11-slim
    commands:
      - echo "Generating documentation..."
      - mkdir -p $ANODYSE_OUTPUT_DIR
      - |
        python -m anopyse \
          --input-path $ANODYSE_INPUT_DIR \
          --output-path $ANODYSE_OUTPUT_DIR
      - echo ""
      - echo "Generated documentation:"
      - ls -lah $ANODYSE_OUTPUT_DIR/
      - echo ""
      - echo "Total files:"
      - find $ANODYSE_OUTPUT_DIR -name "*.md" | wc -l

  # ======================================================
  # Step 5: Verify output
  # ======================================================
  
  - name: verify-output
    image: python:3.11-slim
    commands:
      - |
        if [ ! -f "$ANODYSE_OUTPUT_DIR/index.md" ]; then
          echo "ERROR: index.md not generated"
          exit 1
        fi
      - echo "✓ Documentation validation passed"
      - echo "  - index.md found"
      - echo "  - Ready for publishing"

# ============================================================
# Artifacts (store generated docs)
# ============================================================

volumes:
  - name: docs-volume
    temp: {}

# ============================================================
# Services (optional: for integrations)
